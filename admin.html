<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — دليل الصياد</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #0a0f1e;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #d4af37;
    font-size: 1.4rem;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(212,175,55,0.3);
  }
  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 1;
    min-width: 120px;
    text-align: center;
  }
  .stat-num { font-size: 2rem; font-weight: 900; color: #d4af37; }
  .stat-label { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    overflow: hidden;
  }
  th {
    background: rgba(212,175,55,0.15);
    color: #d4af37;
    padding: 12px;
    font-size: 0.8rem;
    text-align: right;
  }
  td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.85rem;
  }
  tr:hover td { background: rgba(255,255,255,0.03); }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .badge-active   { background: rgba(34,197,94,0.2);  color: #22c55e; }
  .badge-inactive { background: rgba(239,68,68,0.2);  color: #ef4444; }
  .badge-advanced { background: rgba(212,175,55,0.2); color: #d4af37; }
  .badge-basic    { background: rgba(148,163,184,0.2);color: #94a3b8; }
  .last-seen { color: #64748b; font-size: 0.75rem; }
  .refresh-btn {
    display: block;
    margin: 0 auto 20px;
    padding: 10px 30px;
    background: rgba(212,175,55,0.15);
    border: 1px solid #d4af37;
    color: #d4af37;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .refresh-btn:hover { background: rgba(212,175,55,0.25); }
  .loading { text-align: center; color: #64748b; padding: 40px; }
  .error   { text-align: center; color: #ef4444; padding: 40px; }
</style>
</head>
<body>

<h1>🎣 لوحة التحكم — دليل الصياد</h1>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="total-count">—</div>
    <div class="stat-label">إجمالي الصيادين</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="active-count">—</div>
    <div class="stat-label">نشطون</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="advanced-count">—</div>
    <div class="stat-label">مستوى متقدم</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="today-count">—</div>
    <div class="stat-label">دخلوا اليوم</div>
  </div>
</div>

<button class="refresh-btn" onclick="loadUsers()">🔄 تحديث</button>

<div id="table-container">
  <div class="loading">جاري تحميل البيانات...</div>
</div>

<script>
// ======================================================
// إعداد — غيّر هذين السطرين
// ======================================================
var API_BASE = "https://fishing-map-api-production.up.railway.app";
var API_KEY  = "change-this-secret-key";
// ======================================================

function loadUsers() {
  document.getElementById('table-container').innerHTML = '<div class="loading">جاري التحميل...</div>';

  fetch(API_BASE + '/api/admin/users', {
    headers: { 'x-api-key': API_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.users) throw new Error('لا توجد بيانات');

    var users   = data.users;
    var today   = new Date().toISOString().slice(0, 10);
    var active  = users.filter(function(u) { return u.active; }).length;
    var advanced= users.filter(function(u) { return u.level === 'advanced'; }).length;
    var todayIn = users.filter(function(u) { return u.last_seen && u.last_seen.startsWith(today); }).length;

    document.getElementById('total-count').textContent    = users.length;
    document.getElementById('active-count').textContent   = active;
    document.getElementById('advanced-count').textContent = advanced;
    document.getElementById('today-count').textContent    = todayIn;

    var html = '<table>';
    html += '<tr><th>الكود</th><th>الاسم</th><th>الهاتف</th><th>الحالة</th><th>المستوى</th><th>آخر دخول</th></tr>';

    users.forEach(function(u) {
      var activeBadge = u.active
        ? '<span class="badge badge-active">نشط ✅</span>'
        : '<span class="badge badge-inactive">موقوف ❌</span>';
      var levelBadge = u.level === 'advanced'
        ? '<span class="badge badge-advanced">متقدم ⭐</span>'
        : '<span class="badge badge-basic">عادي</span>';
      var lastSeen = u.last_seen
        ? '<span class="last-seen">' + u.last_seen + '</span>'
        : '<span class="last-seen">لم يدخل بعد</span>';

      html += '<tr>';
      html += '<td><strong>' + u.code + '</strong></td>';
      html += '<td>' + (u.name || '—') + '</td>';
      html += '<td>' + (u.phone || '—') + '</td>';
      html += '<td>' + activeBadge + '</td>';
      html += '<td>' + levelBadge + '</td>';
      html += '<td>' + lastSeen + '</td>';
      html += '</tr>';
    });
    html += '</table>';
    document.getElementById('table-container').innerHTML = html;
  })
  .catch(function(err) {
    document.getElementById('table-container').innerHTML =
      '<div class="error">❌ خطأ: ' + err.message + '</div>';
  });
}

loadUsers();
</script>
</body>
</html>
