<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — دليل الصياد</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #0a0f1e;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
}
h1 {
  text-align: center;
  color: #d4af37;
  font-size: 1.3rem;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(212,175,55,0.3);
}
.stats {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.stat-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 16px;
  flex: 1;
  min-width: 100px;
  text-align: center;
}
.stat-num   { font-size: 1.8rem; font-weight: 900; color: #d4af37; }
.stat-label { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

/* قائمة الصيادين */
.users-list { display: flex; flex-direction: column; gap: 8px; }
.user-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.user-card:hover  { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.05); }
.user-card.selected { border-color: #d4af37; background: rgba(212,175,55,0.08); }
.user-header {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(212,175,55,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.user-info { flex: 1; }
.user-name { font-weight: 700; font-size: 0.9rem; }
.user-meta { font-size: 0.72rem; color: #64748b; margin-top: 2px; }
.user-badges { display: flex; gap: 6px; }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
}
.badge-active   { background: rgba(34,197,94,0.15);  color: #22c55e; }
.badge-inactive { background: rgba(239,68,68,0.15);  color: #ef4444; }
.badge-advanced { background: rgba(212,175,55,0.15); color: #d4af37; }
.badge-basic    { background: rgba(148,163,184,0.15);color: #94a3b8; }

/* لوحة الصلاحيات */
.permissions-panel {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.permissions-panel.open { display: block; }
.perm-title { font-size: 0.78rem; color: #94a3b8; margin-bottom: 10px; }
.perm-grid  { display: flex; flex-direction: column; gap: 8px; }
.perm-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.06);
}
.perm-label { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
.perm-icon  { font-size: 1rem; }

/* Toggle Switch */
.toggle {
  position: relative;
  width: 44px; height: 24px;
  cursor: pointer;
}
.toggle input { display: none; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  border-radius: 24px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.15);
}
.toggle-slider:before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #64748b;
  top: 2px; left: 2px;
  transition: 0.3s;
}
.toggle input:checked + .toggle-slider { background: rgba(34,197,94,0.3); border-color: #22c55e; }
.toggle input:checked + .toggle-slider:before { background: #22c55e; transform: translateX(20px); }

.save-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: rgba(212,175,55,0.15);
  border: 1px solid #d4af37;
  color: #d4af37;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 700;
}
.save-btn:hover { background: rgba(212,175,55,0.25); }
.save-status { font-size: 0.75rem; text-align: center; margin-top: 6px; min-height: 18px; }

/* أزرار أدمن */
.admin-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.admin-btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: #e2e8f0;
  cursor: pointer;
  font-size: 0.8rem;
}
.admin-btn:hover { background: rgba(255,255,255,0.1); }
.admin-btn.primary { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.1); }

.loading { text-align: center; color: #64748b; padding: 40px; }
.error   { text-align: center; color: #ef4444; padding: 20px; font-size: 0.85rem; }
</style>
</head>
<body>

<h1>🎣 لوحة التحكم — دليل الصياد</h1>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="total-count">—</div>
    <div class="stat-label">الصيادون</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="active-count">—</div>
    <div class="stat-label">نشطون</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="advanced-count">—</div>
    <div class="stat-label">متقدمون</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="today-count">—</div>
    <div class="stat-label">اليوم</div>
  </div>
</div>

<div class="admin-actions">
  <button class="admin-btn primary" onclick="loadUsers()">🔄 تحديث</button>
</div>

<div id="users-container">
  <div class="loading">جاري التحميل...</div>
</div>

<script>
// ======================================================
var API_BASE = "https://fishing-map-api-production.up.railway.app";
var API_KEY  = "change-this-secret-key";
// ======================================================

// الخدمات المتاحة للمنح
var SERVICES = [
  { key: 'reports',      icon: '🎣', label: 'تقارير الصيادين' },
  { key: 'alerts',       icon: '⚠️', label: 'الأخطار' },
  { key: 'clarity',      icon: '💧', label: 'شفافية المياه' },
  { key: 'depth',        icon: '🗺️', label: 'أعماق البحر' },
  { key: 'routes',       icon: '📍', label: 'المسارات' },
  { key: 'current_deep', icon: '🌊', label: 'تيار العمق 50م' },
];

var allUsers = [];

function loadUsers() {
  document.getElementById('users-container').innerHTML = '<div class="loading">جاري التحميل...</div>';

  fetch(API_BASE + '/api/admin/users', {
    headers: { 'x-api-key': API_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.users) throw new Error(data.detail || 'خطأ');
    allUsers = data.users;
    renderUsers(allUsers);
  })
  .catch(function(err) {
    document.getElementById('users-container').innerHTML =
      '<div class="error">❌ ' + err.message + '</div>';
  });
}

function renderUsers(users) {
  var today    = new Date().toISOString().slice(0, 10);
  var active   = users.filter(function(u) { return u.active; }).length;
  var advanced = users.filter(function(u) { return u.level === 'advanced'; }).length;
  var todayIn  = users.filter(function(u) { return u.last_seen && u.last_seen.startsWith(today); }).length;

  document.getElementById('total-count').textContent    = users.length;
  document.getElementById('active-count').textContent   = active;
  document.getElementById('advanced-count').textContent = advanced;
  document.getElementById('today-count').textContent    = todayIn;

  if (users.length === 0) {
    document.getElementById('users-container').innerHTML =
      '<div class="loading">لا يوجد صيادون مسجلون بعد</div>';
    return;
  }

  var html = '<div class="users-list">';
  users.forEach(function(u, idx) {
    var activeBadge = u.active
      ? '<span class="badge badge-active">نشط</span>'
      : '<span class="badge badge-inactive">موقوف</span>';
    var levelBadge = u.level === 'advanced'
      ? '<span class="badge badge-advanced">⭐ متقدم</span>'
      : '<span class="badge badge-basic">عادي</span>';
    var lastSeen = u.last_seen || 'لم يدخل بعد';
    var perms = u.permissions || {};

    html += '<div class="user-card" id="card-' + idx + '" onclick="toggleCard(' + idx + ')">';
    html += '<div class="user-header">';
    html += '<div class="user-avatar">🎣</div>';
    html += '<div class="user-info">';
    html += '<div class="user-name">' + (u.name || u.code) + ' — <span style="color:#94a3b8;font-weight:400;font-size:.8rem;">' + u.code + '</span></div>';
    html += '<div class="user-meta">📱 ' + (u.phone || '—') + ' &nbsp;|&nbsp; 🕐 ' + lastSeen + '</div>';
    html += '</div>';
    html += '<div class="user-badges">' + activeBadge + levelBadge + '</div>';
    html += '</div>';

    // لوحة الصلاحيات
    html += '<div class="permissions-panel" id="panel-' + idx + '">';
    html += '<div class="perm-title">🔐 الخدمات المتاحة لهذا الصياد</div>';
    html += '<div class="perm-grid">';

    SERVICES.forEach(function(svc) {
      var checked = perms[svc.key] ? 'checked' : '';
      html += '<div class="perm-item">';
      html += '<div class="perm-label"><span class="perm-icon">' + svc.icon + '</span>' + svc.label + '</div>';
      html += '<label class="toggle">';
      html += '<input type="checkbox" id="perm-' + idx + '-' + svc.key + '" ' + checked + ' onclick="event.stopPropagation()">';
      html += '<span class="toggle-slider"></span>';
      html += '</label>';
      html += '</div>';
    });

    html += '</div>';

    // زر حفظ + تفعيل/إيقاف
    html += '<div style="display:flex;gap:8px;margin-top:10px;">';
    html += '<button class="save-btn" style="flex:2" onclick="event.stopPropagation();savePermissions(' + idx + ', \'' + u.code + '\')">💾 حفظ الصلاحيات</button>';
    if (u.active) {
      html += '<button class="save-btn" style="flex:1;border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.1);" onclick="event.stopPropagation();toggleActive(\'' + u.code + '\', false)">🚫 إيقاف</button>';
    } else {
      html += '<button class="save-btn" style="flex:1;border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,0.1);" onclick="event.stopPropagation();toggleActive(\'' + u.code + '\', true)">✅ تفعيل</button>';
    }
    html += '</div>';
    html += '<div class="save-status" id="status-' + idx + '"></div>';
    html += '</div>';
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('users-container').innerHTML = html;
}

function toggleCard(idx) {
  var panel = document.getElementById('panel-' + idx);
  var card  = document.getElementById('card-' + idx);
  var isOpen = panel.classList.contains('open');
  // أغلق كل اللوحات
  document.querySelectorAll('.permissions-panel').forEach(function(p) { p.classList.remove('open'); });
  document.querySelectorAll('.user-card').forEach(function(c) { c.classList.remove('selected'); });
  if (!isOpen) {
    panel.classList.add('open');
    card.classList.add('selected');
  }
}

function savePermissions(idx, code) {
  var statusEl = document.getElementById('status-' + idx);
  statusEl.style.color = '#d4af37';
  statusEl.textContent = 'جاري الحفظ...';

  var perms = {};
  SERVICES.forEach(function(svc) {
    var el = document.getElementById('perm-' + idx + '-' + svc.key);
    if (el) perms[svc.key] = el.checked;
  });

  fetch(API_BASE + '/api/admin/update-permissions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
    body: JSON.stringify({ code: code, permissions: perms })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      statusEl.style.color = '#22c55e';
      statusEl.textContent = '✅ تم الحفظ بنجاح';
      setTimeout(function() { statusEl.textContent = ''; }, 3000);
      loadUsers();
    } else {
      statusEl.style.color = '#ef4444';
      statusEl.textContent = '❌ ' + (data.detail || 'فشل الحفظ');
    }
  })
  .catch(function() {
    statusEl.style.color = '#ef4444';
    statusEl.textContent = '❌ خطأ في الاتصال';
  });
}

function toggleActive(code, active) {
  fetch(API_BASE + '/api/admin/update-permissions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
    body: JSON.stringify({ code: code, active: active })
  })
  .then(function(r) { return r.json(); })
  .then(function() { loadUsers(); })
  .catch(function() { alert('خطأ في الاتصال'); });
}

loadUsers();
</script>
</body>
</html>
