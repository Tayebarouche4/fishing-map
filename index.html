<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام مستغانم - GeoJSON</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --night:#060d18; --gold:#f5a623; --green:#06d6a0; --border:rgba(100,180,220,0.2); }
        html,body { width:100%; height:100%; overflow:hidden; font-family:'Tajawal',sans-serif; background:var(--night); }
        #map { width:100%; height:100%; z-index: 1; }

        /* واجهة التحكم العلوية */
        .top-bar {
            position:absolute; top:0; left:0; right:0; z-index:1000;
            background:rgba(6,13,24,0.95); padding:10px; border-bottom:1px solid var(--border);
            display:none; /* تظهر بعد الدخول */
        }
        .layer-tabs { display:flex; gap:8px; overflow-x:auto; padding:5px 0; }
        .layer-tab {
            flex-shrink:0; background:rgba(255,255,255,0.05); border:1px solid var(--border);
            border-radius:8px; padding:8px 12px; cursor:pointer; color:#6a9bb8; font-size:0.75rem;
        }
        .layer-tab.active { background:rgba(245,166,35,0.2); border-color:var(--gold); color:var(--gold); }

        .route-btn {
            display:inline-block; margin-top:10px; padding:8px 15px;
            background:rgba(6,214,160,0.1); border:1px solid var(--green);
            color:var(--green); border-radius:8px; font-size:0.8rem; cursor:pointer;
        }
        .route-btn.active { background:var(--green); color:var(--night); font-weight:bold; }

        /* شاشة الدخول */
        .login-overlay { position:fixed; inset:0; z-index:9999; background:var(--night); display:flex; align-items:center; justify-content:center; }
        .login-box { background:rgba(17,36,64,0.95); border:1px solid var(--gold); border-radius:20px; padding:30px; width:90%; max-width:320px; text-align:center; }
        .login-input { width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:white; text-align:center; margin:15px 0; outline:none; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="login-overlay" id="login-overlay">
    <div class="login-box">
        <h2 style="color:white;">⚓ دخول النظام</h2>
        <input type="text" id="login-input" class="login-input" placeholder="أدخل الكود">
        <button onclick="doLogin()" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">دخول</button>
    </div>
</div>

<div class="top-bar" id="top-bar">
    <div class="layer-tabs">
        <div class="layer-tab" onclick="toggleOverlay('sst', this)">🌡️ خريطة الحرارة</div>
        <div class="layer-tab" onclick="toggleOverlay('ssh', this)">🌊 خريطة الموج</div>
    </div>
    <div class="route-btn" onclick="toggleGeoJSON(this)">🗺️ إظهار المسارات (GeoJSON)</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
    var map = L.map('map', {zoomControl:false}).setView([36.2, 0.3], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var overlays = {
        sst: L.imageOverlay('sst.png', [[35.5, -0.5], [37.0, 1.5]], {opacity: 0.6}),
        ssh: L.imageOverlay('ssh.png', [[35.5, -0.5], [37.0, 1.5]], {opacity: 0.6})
    };

    var geojsonLayer = null;

    function doLogin() {
        var code = document.getElementById('login-input').value.trim().toUpperCase();
        if(code.length >= 3) {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('top-bar').style.display = 'block';
        }
    }

    // وظيفة تبديل خرائط الصور (الحرارة والموج)
    function toggleOverlay(type, btn) {
        if (map.hasLayer(overlays[type])) {
            map.removeLayer(overlays[type]);
            btn.classList.remove('active');
        } else {
            overlays[type].addTo(map);
            btn.classList.add('active');
        }
    }

    // وظيفة قراءة ملف GeoJSON وعرض المسارات
    function toggleGeoJSON(btn) {
        if (geojsonLayer && map.hasLayer(geojsonLayer)) {
            map.removeLayer(geojsonLayer);
            btn.classList.remove('active');
            btn.textContent = "🗺️ إظهار المسارات (GeoJSON)";
        } else {
            btn.textContent = "⏳ جاري التحميل...";
            
            // جلب ملف GeoJSON من المجلد (يجب أن يكون الملف باسم rout.geojson في GitHub)
            fetch('rout.geojson')
                .then(response => response.json())
                .then(data => {
                    geojsonLayer = L.geoJSON(data, {
                        style: { color: "#06d6a0", weight: 3, opacity: 0.8 }
                    }).addTo(map);
                    
                    btn.classList.add('active');
                    btn.textContent = "🗺️ إخفاء المسارات";
                })
                .catch(err => {
                    console.error(err);
                    alert("تعذر العثور على ملف rout.geojson في مجلدك");
                    btn.textContent = "🗺️ إظهار المسارات (GeoJSON)";
                });
        }
    }
</script>
</body>
</html>
