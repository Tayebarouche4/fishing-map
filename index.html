<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام صيادي مستغانم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal', sans-serif; background:#060d18; color:#e8f1f8; overflow:hidden; }
        #map { width:100%; height:100vh; z-index: 1; }
        
        /* شاشة الدخول بالكود */
        .login-overlay { position:fixed; inset:0; z-index:9999; background:#060d18; display:flex; align-items:center; justify-content:center; }
        .login-box { background:#112440; padding:30px; border-radius:20px; border:1px solid #f5a623; text-align:center; width:90%; max-width:320px; }
        .login-input { width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:white; text-align:center; font-size:18px; }
        .btn-main { background:#f5a623; color:#060d18; border:none; padding:12px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer; }

        /* الواجهة العلوية */
        .top-ui { position:absolute; top:10px; left:10px; right:10px; z-index:1000; display:flex; justify-content:space-between; align-items:center; }
        .gps-status { background:rgba(6,13,24,0.9); padding:8px 15px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); font-size:12px; }
        
        /* زر الإرسال العائم */
        .fab { position:fixed; bottom:30px; right:20px; z-index:2000; width:60px; height:60px; background:#f5a623; border:none; border-radius:50%; font-size:24px; display:none; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(0,0,0,0.5); cursor:pointer; }
        
        .gps-dot { width:15px; height:15px; background:#06d6a0; border-radius:50%; border:2px solid white; box-shadow:0 0 10px #06d6a0; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="login-overlay" id="login-overlay">
    <div class="login-box">
        <h2 style="color:#f5a623;">⚓ دخول النظام</h2>
        <input type="text" id="login-input" class="login-input" placeholder="أدخل كود الصياد">
        <button class="btn-main" onclick="initSystem()">دخول</button>
    </div>
</div>

<div class="top-ui">
    <div style="font-weight:bold; color:#f5a623;">خريطة مستغانم</div>
    <div class="gps-status" id="gps-label">📍 بانتظار الموقع...</div>
</div>

<button class="fab" id="fab" onclick="sendReport()">📋 إرسال الموقع</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
    var map = L.map('map', {zoomControl:false}).setView([36.2, 0.3], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var gpsMarker, gpsLat, gpsLon, currentUser;
    var scriptURL = "https://script.google.com/macros/s/AKfycbxWLFTF4n-EJLW_ew84c8evi2yv_3KG8k0SYnO8MHk/exec";

    function initSystem() {
        var code = document.getElementById('login-input').value.trim();
        if(code.length < 3) return alert("يرجى إدخال كود صحيح");
        
        currentUser = code;
        document.getElementById('login-overlay').style.display = 'none';
        
        // تشغيل الجي بي اس بأبسط كود ممكن لضمان العمل
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(successGPS, errorGPS, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            alert("هاتفك لا يدعم تحديد الموقع");
        }
    }

    function successGPS(pos) {
        gpsLat = pos.coords.latitude;
        gpsLon = pos.coords.longitude;
        
        if (!gpsMarker) {
            gpsMarker = L.marker([gpsLat, gpsLon], {
                icon: L.divIcon({className:'', html:'<div class="gps-dot"></div>'})
            }).addTo(map);
            map.setView([gpsLat, gpsLon], 14);
        } else {
            gpsMarker.setLatLng([gpsLat, gpsLon]);
        }
        
        document.getElementById('gps-label').innerHTML = "✅ الموقع نشط";
        document.getElementById('gps-label').style.color = "#06d6a0";
        document.getElementById('fab').style.display = 'flex';
    }

    function errorGPS(err) {
        console.warn(err);
        document.getElementById('gps-label').innerHTML = "❌ خطأ في الإشارة";
        document.getElementById('gps-label').style.color = "#ff4d4d";
    }

    function sendReport() {
        if(!gpsLat) return alert("لم يتم تحديد الموقع بعد");
        
        var btn = document.getElementById('fab');
        btn.innerHTML = "🔄...";
        
        var data = {
            code: currentUser,
            lat: gpsLat.toFixed(6),
            lon: gpsLon.toFixed(6),
            status: "نشط",
            date: new Date().toLocaleDateString('fr-DZ')
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            alert("تم إرسال موقعك للجدول العربي بنجاح (الأعمدة 5a, 6a)");
            btn.innerHTML = "📋";
        })
        .catch(() => {
            alert("خطأ في الشبكة");
            btn.innerHTML = "📋";
        });
    }
</script>
</body>
</html>
