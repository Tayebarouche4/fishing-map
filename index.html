<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خريطة الصياد التفاعلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --night:#060d18; --gold:#f5a623; --gold2:#ffd166;
            --green:#06d6a0; --dim:#6a9bb8; --text:#e8f1f8;
            --border:rgba(100,180,220,0.2);
        }
        html,body { width:100%; height:100%; overflow:hidden; font-family:'Tajawal',sans-serif; background:var(--night); }
        #map { width:100%; height:100%; z-index: 1; }
        .top-bar { position:absolute; top:0; left:0; right:0; z-index:1000; background:rgba(6,13,24,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
        .brand { display:flex; align-items:center; gap:8px; }
        .brand-text { font-size:.95rem; font-weight:900; color:var(--gold); }
        .hbtn { background:rgba(255,255,255,.08); border:1px solid var(--border); color:var(--text); font-family:'Tajawal'; font-size:.72rem; padding:8px 12px; border-radius:8px; cursor:pointer; }
        .hbtn.gps-on { background:rgba(6,214,160,.2); border-color:var(--green); color:var(--green); }
        .report-fab { position:absolute; bottom:30px; right:20px; z-index:2000; width:60px; height:60px; background:var(--gold); border:none; border-radius:50%; cursor:pointer; font-size:1.8rem; display:none; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(0,0,0,0.5); }
        .gps-pulse { width:16px; height:16px; background:var(--green); border-radius:50%; border:2px solid white; box-shadow:0 0 8px var(--green); }
        .login-overlay { position:absolute; inset:0; z-index:3000; background:var(--night); display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-box { background:rgba(17,36,64,.9); border:1px solid var(--border); border-radius:18px; padding:30px; width:100%; max-width:320px; text-align:center; }
        .login-input { width:100%; padding:12px; background:rgba(255,255,255,.08); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:1.1rem; text-align:center; margin-bottom:15px; outline:none; }
        .login-btn { width:100%; padding:12px; background:var(--gold); border:none; border-radius:10px; color:var(--night); font-weight:700; cursor:pointer; }
        .rating-panel { position:absolute; bottom:0; left:0; right:0; z-index:2500; background:var(--night); border-top:2px solid var(--gold); padding:20px; transform:translateY(100%); transition:transform .3s ease; }
        .rating-panel.open { transform:translateY(0); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div style="font-size:40px; margin-bottom:10px;">🎣</div>
    <div style="color:white; font-weight:900; margin-bottom:15px;">دليل الصياد - مستغانم</div>
    <input class="login-input" id="login-input" type="text" placeholder="أدخل الكود الخاص بك">
    <button class="login-btn" onclick="doLogin()">دخول</button>
  </div>
</div>

<button class="report-fab" id="report-fab" onclick="openRating()">📋</button>

<div class="top-bar">
    <div class="brand">
        <div class="brand-text">⚓ خريطة مستغانم</div>
    </div>
    <button class="hbtn" id="gps-btn" onclick="toggleGPS()">📍 تفعيل الموقع</button>
</div>

<div class="rating-panel" id="rating-panel">
    <div style="text-align:center; color:white; margin-bottom:15px;">تسجيل حالة الصيد في الجدول</div>
    <button class="login-btn" onclick="sendRating()">إرسال التقرير الآن</button>
    <button class="hbtn" style="width:100%; margin-top:10px;" onclick="closeRating()">إلغاء</button>
    <div id="send-status" style="text-align:center; margin-top:10px; color:var(--green);"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
var SHEET_URL = "https://script.google.com/macros/s/AKfycbxWLFTF4n-EJLW_ew84c8evi2yv_3KG8k0SYnO8MHk/exec";
var currentUser = null;
var gpsLat = null, gpsLon = null, gpsActive = false;
var map, gpsMarker, gpsWatchId;

// تشغيل الخريطة الأساسية
map = L.map('map', {zoomControl:false}).setView([36.2, 0.3], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function doLogin() {
    var code = document.getElementById('login-input').value.trim();
    if (code.length >= 3) {
        currentUser = code;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('report-fab').style.display = 'flex';
        startGPS(); // محاولة تشغيل الجي بي اس فوراً
    } else {
        alert("يرجى إدخال كود صحيح");
    }
}

function toggleGPS() { gpsActive ? stopGPS() : startGPS(); }

function startGPS() {
    if(!navigator.geolocation) return alert('هاتفك لا يدعم الجي بي اس');
    
    var btn = document.getElementById('gps-btn');
    btn.textContent = '🔄 جاري التحديد...';

    var options = {
        enableHighAccuracy: true,
        timeout: 15000, // وقت انتظار كافٍ للإشارة
        maximumAge: 0
    };

    gpsWatchId = navigator.geolocation.watchPosition(function(pos) {
        gpsLat = pos.coords.latitude;
        gpsLon = pos.coords.longitude;
        
        if(!gpsMarker) {
            gpsMarker = L.marker([gpsLat, gpsLon], {
                icon: L.divIcon({className:'', html:'<div class="gps-pulse"></div>', iconSize:[16,16]})
            }).addTo(map);
            map.setView([gpsLat, gpsLon], 14);
        } else {
            gpsMarker.setLatLng([gpsLat, gpsLon]);
        }
        
        btn.textContent = '✅ الموقع نشط';
        btn.classList.add('gps-on');
        gpsActive = true;
    }, function(err) {
        console.warn("GPS Error: ", err.message);
        btn.textContent = '📍 الموقع معطل';
        // إذا فشل بسبب الوقت، سيحاول مرة أخرى تلقائياً
        if(err.code === 3) setTimeout(startGPS, 3000);
    }, options);
}

function stopGPS() {
    if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
    if(gpsMarker) map.removeLayer(gpsMarker);
    document.getElementById('gps-btn').textContent = '📍 تفعيل الموقع';
    document.getElementById('gps-btn').classList.remove('gps-on');
    gpsActive = false;
}

function openRating() { document.getElementById('rating-panel').classList.add('open'); }
function closeRating() { document.getElementById('rating-panel').classList.remove('open'); }

function sendRating() {
    if (!gpsLat) return alert("يرجى انتظار تحديد موقعك على الخريطة أولاً");
    var status = document.getElementById('send-status');
    status.textContent = "جاري الإرسال للجدول...";
    
    var payload = {
        boat_id: currentUser,
        lat: gpsLat.toFixed(6),
        lon: gpsLon.toFixed(6),
        status: "صيد نشط",
        quantity: 0
    };

    fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' })
    .then(() => {
        status.textContent = "✅ تم تسجيل البيانات في جدولك";
        setTimeout(closeRating, 2500);
    }).catch(() => {
        status.textContent = "❌ فشل الإرسال، تحقق من الإنترنت";
    });
}
</script>
</body>
</html>
