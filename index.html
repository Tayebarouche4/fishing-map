<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خريطة الصياد التفاعلية - مستغانم</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* المتغيرات التصميمية */
        :root {
            --night: #060d18; --gold: #f5a623; --gold2: #ffd166;
            --green: #06d6a0; --dim: #6a9bb8; --text: #e8f1f8;
            --border: rgba(100,180,220,0.2);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; font-family:'Tajawal',sans-serif; background: var(--night); }
        #map { width:100%; height:100%; z-index: 1; }

        /* الشريط العلوي */
        .top-bar {
            position:absolute; top:0; left:0; right:0; z-index:1000;
            background:linear-gradient(180deg,rgba(6,13,24,.97),rgba(6,13,24,.85));
            backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
            padding:10px 14px 8px;
        }
        .top-bar-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .brand { display:flex; align-items:center; gap:8px; }
        .brand-icon {
            width:34px; height:34px; background:linear-gradient(135deg,var(--gold),#d06b00);
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            font-size:18px; box-shadow:0 3px 12px rgba(245,166,35,.4);
        }
        .brand-text { font-size:.95rem; font-weight:900; color:var(--text); }
        .header-btns { display:flex; gap:6px; }
        .hbtn {
            background:rgba(255,255,255,.08); border:1px solid var(--border);
            color:var(--text); font-family:'Tajawal',sans-serif;
            font-size:.72rem; padding:5px 10px; border-radius:8px;
            cursor:pointer;
        }
        .hbtn.gps-on { background:rgba(6,214,160,.2); border-color:var(--green); color:var(--green); }

        /* نظام التبويبات للطبقات */
        .layer-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding:10px 0; }
        .layer-tab {
            flex-shrink:0; display:flex; align-items:center; gap:5px;
            background:rgba(255,255,255,.07); border:1px solid var(--border);
            border-radius:8px; padding:8px 12px; cursor:pointer;
        }
        .layer-tab.active { background:rgba(245,166,35,.2); border-color:var(--gold); }
        .layer-tab-label { font-size:.72rem; font-weight:700; color:var(--dim); }
        .layer-tab.active .layer-tab-label { color:var(--gold2); }

        /* شاشة الدخول */
        .login-overlay {
            position:fixed; inset:0; z-index:9999;
            background:var(--night); display:flex; align-items:center; justify-content:center;
        }
        .login-box {
            background:rgba(17,36,64,.9); border:1px solid var(--gold);
            border-radius:20px; padding:35px; width:90%; max-width:350px; text-align:center;
        }
        .login-input {
            width:100%; padding:15px; background:rgba(255,255,255,.05);
            border:1px solid var(--border); border-radius:12px; color:white;
            text-align:center; margin:20px 0; font-size:1.2rem; outline:none;
        }

        /* زر التقرير العائم */
        .report-fab {
            position:fixed; bottom:90px; right:20px; z-index:1001;
            width:56px; height:56px; background:linear-gradient(135deg,var(--gold),#d06b00);
            border:none; border-radius:50%; font-size:24px; cursor:pointer;
            display:none; align-items:center; justify-content:center;
            box-shadow:0 4px 15px rgba(0,0,0,0.5);
        }

        /* لوحة التقييم */
        .rating-panel {
            position:fixed; bottom:0; left:0; right:0; z-index:2000;
            background:var(--night); border-top:2px solid var(--gold);
            border-radius:20px 20px 0 0; padding:20px;
            transform:translateY(100%); transition: 0.3s ease;
        }
        .rating-panel.open { transform:translateY(0); }
        .rating-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:15px 0; }
        .rating-btn {
            background:rgba(255,255,255,0.05); border:1px solid var(--border);
            padding:15px; border-radius:12px; color:white; cursor:pointer; text-align:center;
        }
        .rating-btn.selected { border-color:var(--gold); background:rgba(245,166,35,0.2); }

        /* الـ Legend */
        .legend {
            position:fixed; left:15px; bottom:100px; z-index:1000;
            background:rgba(6,13,24,0.9); padding:10px; border-radius:10px;
            border:1px solid var(--border); min-width:120px;
        }
        .gps-pulse {
            width:18px; height:18px; background:var(--green);
            border-radius:50%; border:2px solid white; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(6,214,160, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(6,214,160, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6,214,160, 0); }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="login-overlay" id="login-overlay">
    <div class="login-box">
        <div style="font-size:50px;">⚓</div>
        <h2 style="color:white; margin-top:10px;">نظام الصياد المحترف</h2>
        <input type="text" id="login-input" class="login-input" placeholder="FISHER_01" oninput="this.value=this.value.toUpperCase()">
        <button onclick="doLogin()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">دخول النظام</button>
        <div id="login-error" style="color:#ef233c; margin-top:10px; display:none;">⚠️ كود غير مسجل</div>
    </div>
</div>

<button class="report-fab" id="report-fab" onclick="openRating()">📋</button>

<div class="rating-panel" id="rating-panel">
    <div style="text-align:center; color:white;">
        <h3>📋 تقييم الموقع</h3>
        <p id="rating-coords" style="font-size:12px; color:var(--dim);"></p>
    </div>
    <div class="rating-grid">
        <div class="rating-btn" onclick="selectRating(this,'صيد ناجح')">✅ صيد ناجح</div>
        <div class="rating-btn" onclick="selectRating(this,'لا يوجد صيد')">❌ لا يوجد صيد</div>
        <div class="rating-btn" onclick="selectRating(this,'تجمع سمك')">🟡 تجمع سمك</div>
        <div class="rating-btn" onclick="selectRating(this,'ملاحظة')">👁️ ملاحظة</div>
    </div>
    <div id="boxes-wrap" style="display:none; margin-bottom:15px;">
        <label style="color:var(--dim); font-size:12px;">عدد الصناديق:</label>
        <input type="number" id="boxes-input" style="width:100%; padding:10px; border-radius:8px; border:none;">
    </div>
    <button onclick="sendRating()" style="width:100%; padding:15px; background:var(--green); border:none; border-radius:12px; font-weight:bold;">إرسال التقرير</button>
    <button onclick="closeRating()" style="width:100%; margin-top:10px; background:transparent; color:white; border:none;">إلغاء</button>
    <div id="send-status" style="text-align:center; margin-top:10px; display:none;"></div>
</div>

<div class="top-bar">
    <div class="top-bar-row1">
        <div class="brand">
            <div class="brand-icon">⚓</div>
            <div>
                <div class="brand-text">خريطة مستغانم</div>
                <div id="active-label" style="font-size:10px; color:var(--gold2);">بانتظار اختيار الطبقة</div>
            </div>
        </div>
        <div class="header-btns">
            <button class="hbtn" id="gps-btn" onclick="toggleGPS()">📍 GPS</button>
            <button class="hbtn" onclick="map.setView([36.2,0.3],9)">🏠 الرئيسية</button>
        </div>
    </div>
    <div class="layer-tabs">
        <div class="layer-tab active" onclick="switchLayer('sst',this)">🌡️ حرارة</div>
        <div class="layer-tab" onclick="switchLayer('ssh',this)">🌊 مستوى البحر</div>
        <div class="layer-tab" onclick="switchLayer('uo',this)">⬅️ تيار E/W</div>
        <div class="layer-tab" onclick="switchLayer('vo',this)">⬆️ تيار N/S</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
    // --- الإعدادات ---
    var SHEET_URL = "https://script.google.com/macros/s/AKfycbxWLFTF4n-EJLW_ew84c8evi2yv_3KG8k0SYnO8MHk/exec";
    var VALID_CODES = ["FISHER_01","FISHER_02","FISHER_03","FISHER_04","FISHER_05"];
    
    var map, gpsMarker, gpsLat, gpsLon, currentUser, selectedRating;
    var currentOverlay = null;

    // --- تهيئة الخريطة ---
    map = L.map('map', {zoomControl:false}).setView([36.2, 0.3], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // --- نظام الدخول ---
    function doLogin() {
        var code = document.getElementById('login-input').value.trim().toUpperCase();
        if (VALID_CODES.indexOf(code) >= 0) {
            currentUser = code;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('report-fab').style.display = 'flex';
            startGPS();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // --- الجي بي اس ---
    function startGPS() {
        navigator.geolocation.watchPosition(function(pos) {
            gpsLat = pos.coords.latitude;
            gpsLon = pos.coords.longitude;
            var acc = pos.coords.accuracy;
            
            var icon = L.divIcon({className:'', html:'<div class="gps-pulse"></div>', iconSize:[18,18]});
            if(!gpsMarker) {
                gpsMarker = L.marker([gpsLat, gpsLon], {icon: icon}).addTo(map);
                map.setView([gpsLat, gpsLon], 12);
            } else {
                gpsMarker.setLatLng([gpsLat, gpsLon]);
            }
            document.getElementById('gps-btn').classList.add('gps-on');
        }, null, {enableHighAccuracy:true});
    }

    // --- نظام التقييم ---
    function openRating() {
        if(!gpsLat) return alert("انتظر تحديد موقعك عبر GPS");
        document.getElementById('rating-coords').textContent = gpsLat.toFixed(4) + "N , " + gpsLon.toFixed(4) + "E";
        document.getElementById('rating-panel').classList.add('open');
    }

    function closeRating() { document.getElementById('rating-panel').classList.remove('open'); }

    function selectRating(btn, rating) {
        document.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedRating = rating;
        document.getElementById('boxes-wrap').style.display = (rating === 'صيد ناجح') ? 'block' : 'none';
    }

    function sendRating() {
        if(!selectedRating) return alert("اختر نوع التقييم");
        var status = document.getElementById('send-status');
        status.style.display = 'block'; status.textContent = "⏳ جاري الإرسال...";
        
        var payload = {
            date: new Date().toLocaleDateString('fr-DZ'),
            time: new Date().toLocaleTimeString('fr-DZ'),
            code: currentUser,
            lat: gpsLat, lon: gpsLon,
            rating: selectedRating,
            boxes: document.getElementById('boxes-input').value || 0
        };

        fetch(SHEET_URL, { method:'POST', mode: 'no-cors', body: JSON.stringify(payload) })
        .then(() => {
            status.textContent = "✅ تم الإرسال بنجاح!";
            setTimeout(closeRating, 2000);
        }).catch(() => status.textContent = "❌ فشل الإرسال");
    }

    // --- تبديل الطبقات (SST, SSH...) ---
    function switchLayer(type, btn) {
        document.querySelectorAll('.layer-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        // هنا يمكنك إضافة كود L.imageOverlay الخاص بكل طبقة بناءً على تاريخ اليوم
        console.log("Switching to: " + type);
        document.getElementById('active-label').textContent = "طبقة: " + type.toUpperCase();
    }
</script>
</body>
</html>
