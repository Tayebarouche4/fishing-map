<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خريطة الصياد التفاعلية</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
<script src="https://unpkg.com/georaster@1.6.0/georaster.browser.bundle.js"></script>
<script src="https://unpkg.com/georaster-layer-for-leaflet@2.3.0/dist/georaster-layer-for-leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --night:#060d18; --gold:#f5a623; --gold2:#ffd166;
  --green:#06d6a0; --dim:#6a9bb8; --text:#e8f1f8;
  --border:rgba(100,180,220,0.2);
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'Tajawal',sans-serif; }
#map { width:100%; height:100%; }

.top-bar {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  background:linear-gradient(180deg,rgba(6,13,24,.97),rgba(6,13,24,.85));
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:10px 14px 8px;
}
.top-bar-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.brand { display:flex; align-items:center; gap:8px; }
.brand-icon {
  width:34px; height:34px;
  background:linear-gradient(135deg,var(--gold),#d06b00);
  border-radius:8px; display:flex; align-items:center;
  justify-content:center; font-size:18px;
  box-shadow:0 3px 12px rgba(245,166,35,.4);
}
.brand-text { font-size:.95rem; font-weight:900; color:var(--text); }
.brand-sub  { font-size:.6rem; color:var(--dim); }

.header-btns { display:flex; gap:6px; }
.hbtn {
  background:rgba(255,255,255,.08); border:1px solid var(--border);
  color:var(--text); font-family:'Tajawal',sans-serif;
  font-size:.72rem; padding:5px 10px; border-radius:8px;
  cursor:pointer; transition:all .2s;
}
.hbtn:active { transform:scale(.95); }
.hbtn.gps-on { background:rgba(6,214,160,.2); border-color:var(--green); color:var(--green); }

.layer-tabs {
  display:flex; gap:6px; overflow-x:auto;
  scrollbar-width:none; padding-bottom:2px;
}
.layer-tabs::-webkit-scrollbar { display:none; }
.layer-tab {
  flex-shrink:0; display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,.07); border:1px solid var(--border);
  border-radius:8px; padding:5px 10px;
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.layer-tab.active { background:rgba(245,166,35,.2); border-color:var(--gold); }
.layer-tab-icon  { font-size:1rem; }
.layer-tab-label { font-size:.72rem; font-weight:700; color:var(--dim); }
.layer-tab.active .layer-tab-label { color:var(--gold2); }

.opacity-wrap { display:flex; align-items:center; gap:8px; margin-top:8px; }
.opacity-wrap label { font-size:.65rem; color:var(--dim); white-space:nowrap; }
input[type=range] { flex:1; height:4px; cursor:pointer; accent-color:var(--gold); }

.info-panel {
  position:absolute; bottom:0; left:0; right:0; z-index:1000;
  background:linear-gradient(0deg,rgba(6,13,24,.97),rgba(6,13,24,.85));
  backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding:10px 14px 12px;
}
.info-row { display:flex; gap:8px; }
.info-card {
  flex:1; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:10px;
  padding:8px 6px; text-align:center;
}
.info-val { font-size:.85rem; font-weight:700; color:var(--text); }
.info-lbl { font-size:.56rem; color:var(--dim); margin-top:2px; }

.click-popup {
  position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
  z-index:1001;
  background:rgba(6,13,24,.96); border:1px solid var(--gold);
  border-radius:12px; padding:12px 20px;
  text-align:center; min-width:220px; display:none;
  animation:fadeUp .2s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateX(-50%) translateY(8px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
.cp-close  { position:absolute; top:7px; left:12px; cursor:pointer; color:var(--dim); font-size:.9rem; }
.cp-coords { font-size:.68rem; color:var(--dim); margin-bottom:4px; }
.cp-layer  { font-size:.72rem; color:var(--dim); margin-bottom:6px; }
.cp-val    { font-size:1.4rem; font-weight:900; color:var(--gold2); }
.cp-unit   { font-size:.7rem; color:var(--dim); margin-top:2px; }

.gps-pulse {
  width:18px; height:18px; background:var(--green);
  border-radius:50%; border:3px solid white;
  animation:gpsPulse 2s infinite;
}
@keyframes gpsPulse {
  0%   { box-shadow:0 0 0 0 rgba(6,214,160,.6); }
  70%  { box-shadow:0 0 0 12px rgba(6,214,160,0); }
  100% { box-shadow:0 0 0 0 rgba(6,214,160,0); }
}

.loading-bar {
  position:absolute; inset:0; z-index:999;
  background:var(--night);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
}
.spinner {
  width:44px; height:44px;
  border:4px solid rgba(245,166,35,.2);
  border-top-color:var(--gold);
  border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:.85rem; color:var(--dim); }

.colorbar {
  position:absolute; bottom:90px; right:14px; z-index:999;
  background:rgba(6,13,24,.85); border:1px solid var(--border);
  border-radius:10px; padding:10px 10px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.cb-title { font-size:.62rem; color:var(--dim); text-align:center; margin-bottom:4px; }
.cb-bar   { width:16px; height:120px; border-radius:4px; }
.cb-max   { font-size:.62rem; color:var(--text); }
.cb-min   { font-size:.62rem; color:var(--text); }
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">جاري تحميل الخريطة...</div>
</div>

<div id="map"></div>

<div class="top-bar">
  <div class="top-bar-row1">
    <div class="brand">
      <div class="brand-icon">&#127907;</div>
      <div>
        <div class="brand-text">خريطة الصياد</div>
        <div class="brand-sub" id="active-label">اختر طبقة</div>
      </div>
    </div>
    <div class="header-btns">
      <button class="hbtn" id="gps-btn" onclick="toggleGPS()">&#128205; GPS</button>
      <button class="hbtn" onclick="map.setView([36.2,0.3],9)">&#127758; العودة</button>
    </div>
  </div>

  <div class="layer-tabs">
    <div class="layer-tab active" onclick="switchLayer('sst',this)">
      <span class="layer-tab-icon">&#127777;</span>
      <span class="layer-tab-label">حرارة</span>
    </div>
    <div class="layer-tab" onclick="switchLayer('ssh',this)">
      <span class="layer-tab-icon">&#11205;</span>
      <span class="layer-tab-label">مستوى البحر</span>
    </div>
    <div class="layer-tab" onclick="switchLayer('uo',this)">
      <span class="layer-tab-icon">&#8596;</span>
      <span class="layer-tab-label">تيار شرق/غرب</span>
    </div>
    <div class="layer-tab" onclick="switchLayer('vo',this)">
      <span class="layer-tab-icon">&#8597;</span>
      <span class="layer-tab-label">تيار شمال/جنوب</span>
    </div>
  </div>

  <div class="opacity-wrap">
    <label>شفافية</label>
    <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.85"
           oninput="setOpacity(this.value)">
  </div>
</div>

<div class="colorbar" id="colorbar">
  <div class="cb-title" id="cb-title">--</div>
  <div class="cb-max"  id="cb-max">--</div>
  <canvas class="cb-bar" id="cb-bar" width="16" height="120"></canvas>
  <div class="cb-min"  id="cb-min">--</div>
</div>

<div class="click-popup" id="click-popup">
  <span class="cp-close" onclick="document.getElementById('click-popup').style.display='none'">&#10005;</span>
  <div class="cp-coords" id="cp-coords"></div>
  <div class="cp-layer"  id="cp-layer"></div>
  <div class="cp-val"    id="cp-val">--</div>
  <div class="cp-unit"   id="cp-unit"></div>
</div>

<div class="info-panel">
  <div class="info-row">
    <div class="info-card">
      <div class="info-val" id="info-lat">--</div>
      <div class="info-lbl">خط العرض</div>
    </div>
    <div class="info-card">
      <div class="info-val" id="info-lon">--</div>
      <div class="info-lbl">خط الطول</div>
    </div>
    <div class="info-card">
      <div class="info-val" id="info-zoom">9</div>
      <div class="info-lbl">التكبير</div>
    </div>
    <div class="info-card">
      <div class="info-val" id="info-gps">--</div>
      <div class="info-lbl">دقة GPS</div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  الإعدادات — غيّر التاريخ كل يوم
// ============================================================
var DATE = "2026-03-18";

var LAYERS = {
  sst: {
    label: "حرارة السطح", unit: "°C",
    file:  "tiles/" + DATE + "/sst.tif",
    min: 10, max: 32,
    colors: ['#313695','#4575b4','#74add1','#abd9e9','#e0f3f8',
             '#ffffbf','#fee090','#fdae61','#f46d43','#d73027','#a50026'],
  },
  ssh: {
    label: "مستوى سطح البحر", unit: "m",
    file:  "tiles/" + DATE + "/ssh.tif",
    min: -0.3, max: 0.3,
    colors: ['#053061','#2166ac','#4393c3','#92c5de','#d1e5f0',
             '#f7f7f7','#fddbc7','#f4a582','#d6604d','#b2182b','#67001f'],
  },
  uo: {
    label: "تيار شرق/غرب", unit: "m/s",
    file:  "tiles/" + DATE + "/uo.tif",
    min: -0.5, max: 0.5,
    colors: ['#7f3b08','#b35806','#e08214','#fdb863','#fee0b6',
             '#f7f7f7','#d8daeb','#b2abd2','#8073ac','#542788','#2d004b'],
  },
  vo: {
    label: "تيار شمال/جنوب", unit: "m/s",
    file:  "tiles/" + DATE + "/vo.tif",
    min: -0.5, max: 0.5,
    colors: ['#276419','#4d9221','#7fbc41','#b8e186','#e6f5d0',
             '#f7f7f7','#fde0ef','#f1b6da','#de77ae','#c51b7d','#8e0152'],
  },
};
// ============================================================

var map = L.map('map', { zoomControl:false, attributionControl:false });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  { maxZoom:18 }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
  { maxZoom:18, zIndex:650 }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);
map.setView([36.2, 0.3], 9);

var currentLayer = null;
var currentCfg   = null;
var currentOp    = 0.85;

function drawColorbar(cfg) {
  var canvas = document.getElementById('cb-bar');
  var ctx    = canvas.getContext('2d');
  var scale  = chroma.scale(cfg.colors).domain([cfg.min, cfg.max]);
  var h      = canvas.height;
  for (var i = 0; i < h; i++) {
    var val = cfg.max - (i / h) * (cfg.max - cfg.min);
    ctx.fillStyle = scale(val).hex();
    ctx.fillRect(0, i, 16, 1);
  }
  document.getElementById('cb-title').textContent = cfg.unit;
  document.getElementById('cb-max').textContent   = cfg.max;
  document.getElementById('cb-min').textContent   = cfg.min;
}

function switchLayer(id, tabEl) {
  var cfg = LAYERS[id];
  if (!cfg) return;

  document.querySelectorAll('.layer-tab').forEach(function(t) {
    t.classList.remove('active');
  });
  if (tabEl) tabEl.classList.add('active');
  document.getElementById('active-label').textContent = cfg.label;
  document.getElementById('click-popup').style.display = 'none';
  document.getElementById('loading-text').textContent = 'جاري تحميل ' + cfg.label + '...';
  document.getElementById('loading-bar').style.display = 'flex';

  if (currentLayer) { map.removeLayer(currentLayer); currentLayer = null; }
  currentCfg = cfg;

  var scale = chroma.scale(cfg.colors).domain([cfg.min, cfg.max]);

  fetch(cfg.file)
    .then(function(r) { return r.arrayBuffer(); })
    .then(function(buf) { return parseGeoraster(buf); })
    .then(function(georaster) {
      currentLayer = new GeoRasterLayer({
        georaster:   georaster,
        opacity:     currentOp,
        pixelValuesToColorFn: function(vals) {
          var v = vals[0];
          if (v === null || v === undefined || v <= -9000 || isNaN(v)) return null;
          return scale(Math.max(cfg.min, Math.min(cfg.max, v))).hex();
        },
        resolution: 512,
      });
      currentLayer.addTo(map);
      drawColorbar(cfg);
      document.getElementById('loading-bar').style.display = 'none';
    })
    .catch(function(e) {
      document.getElementById('loading-text').textContent = 'تعذر تحميل الملف: ' + cfg.file;
      console.error(e);
    });
}

function setOpacity(val) {
  currentOp = parseFloat(val);
  if (currentLayer) currentLayer.setOpacity(currentOp);
}

// تحديث المعلومات عند التحريك
map.on('mousemove', function(e) {
  document.getElementById('info-lat').textContent = e.latlng.lat.toFixed(4) + 'N';
  document.getElementById('info-lon').textContent = e.latlng.lng.toFixed(4) + 'E';
});
map.on('zoomend', function() {
  document.getElementById('info-zoom').textContent = map.getZoom();
});

// قيمة النقطة عند الضغط
map.on('click', function(e) {
  if (!currentLayer || !currentCfg) return;
  var georaster = currentLayer.options.georaster;
  var lat = e.latlng.lat;
  var lon = e.latlng.lng;
  var bounds = [[georaster.ymin, georaster.xmin],[georaster.ymax, georaster.xmax]];
  if (lat < georaster.ymin || lat > georaster.ymax ||
      lon < georaster.xmin || lon > georaster.xmax) return;

  var col = Math.floor((lon - georaster.xmin) / georaster.pixelWidth);
  var row = Math.floor((georaster.ymax - lat)  / georaster.pixelHeight);
  var val = georaster.values[0][row] ? georaster.values[0][row][col] : null;

  var popup = document.getElementById('click-popup');
  document.getElementById('cp-coords').textContent =
    lat.toFixed(4) + 'N  ' + lon.toFixed(4) + 'E';
  document.getElementById('cp-layer').textContent = currentCfg.label;

  if (val !== null && val !== undefined && val > -9000 && !isNaN(val)) {
    document.getElementById('cp-val').textContent  = val.toFixed(3);
    document.getElementById('cp-unit').textContent = currentCfg.unit;
  } else {
    document.getElementById('cp-val').textContent  = 'لا توجد بيانات';
    document.getElementById('cp-unit').textContent = '';
  }
  popup.style.display = 'block';
});

// GPS
var gpsMarker = null, gpsCircle = null, gpsWatchId = null, gpsActive = false;

function toggleGPS() {
  gpsActive ? stopGPS() : startGPS();
}

function startGPS() {
  if (!navigator.geolocation) { alert('المتصفح لا يدعم GPS'); return; }
  var btn = document.getElementById('gps-btn');
  btn.textContent = '...';
  gpsWatchId = navigator.geolocation.watchPosition(function(pos) {
    var lat = pos.coords.latitude, lon = pos.coords.longitude, acc = pos.coords.accuracy;
    var icon = L.divIcon({ className:'', html:'<div class="gps-pulse"></div>', iconSize:[18,18], iconAnchor:[9,9] });
    if (!gpsMarker) {
      gpsMarker = L.marker([lat,lon],{icon:icon,zIndexOffset:1000}).addTo(map).bindPopup('موقعك الحالي');
      gpsCircle = L.circle([lat,lon],{radius:acc,color:'#06d6a0',fillColor:'#06d6a0',fillOpacity:0.1,weight:1}).addTo(map);
      map.setView([lat,lon], 12);
    } else {
      gpsMarker.setLatLng([lat,lon]);
      gpsCircle.setLatLng([lat,lon]);
      gpsCircle.setRadius(acc);
    }
    document.getElementById('info-lat').textContent = lat.toFixed(4) + 'N';
    document.getElementById('info-lon').textContent = lon.toFixed(4) + 'E';
    document.getElementById('info-gps').textContent = Math.round(acc) + 'm';
    btn.textContent = '🟢 GPS';
    btn.classList.add('gps-on');
    gpsActive = true;
  }, function(err) {
    document.getElementById('gps-btn').textContent = '📍 GPS';
    alert('تعذر تحديد الموقع: ' + err.message);
  }, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
}

function stopGPS() {
  if (gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
  if (gpsMarker)  { map.removeLayer(gpsMarker); gpsMarker = null; }
  if (gpsCircle)  { map.removeLayer(gpsCircle); gpsCircle = null; }
  var btn = document.getElementById('gps-btn');
  btn.textContent = '📍 GPS';
  btn.classList.remove('gps-on');
  document.getElementById('info-gps').textContent = '--';
  gpsActive = false; gpsWatchId = null;
}

// تحميل أول طبقة
switchLayer('sst', document.querySelector('.layer-tab'));
</script>
</body>
</html>
