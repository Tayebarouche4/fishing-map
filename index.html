<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خريطة الصياد التفاعلية</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --night:#060d18; --gold:#f5a623; --gold2:#ffd166;
  --green:#06d6a0; --dim:#6a9bb8; --text:#e8f1f8;
  --border:rgba(100,180,220,0.2);
}
html,body { width:100%; height:100%; overflow:hidden; font-family:'Tajawal',sans-serif; }
#map { width:100%; height:100%; }
.top-bar {
  position:absolute; top:0; left:0; right:0; z-index:1000;
  background:linear-gradient(180deg,rgba(6,13,24,.97),rgba(6,13,24,.85));
  backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
  padding:10px 14px 8px;
}
.top-bar-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.brand { display:flex; align-items:center; gap:8px; }
.brand-icon {
  width:34px; height:34px; background:linear-gradient(135deg,var(--gold),#d06b00);
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:18px; box-shadow:0 3px 12px rgba(245,166,35,.4);
}
.brand-text { font-size:.95rem; font-weight:900; color:var(--text); }
.brand-sub  { font-size:.6rem; color:var(--dim); }
.header-btns { display:flex; gap:6px; }
.hbtn {
  background:rgba(255,255,255,.08); border:1px solid var(--border);
  color:var(--text); font-family:'Tajawal',sans-serif;
  font-size:.72rem; padding:5px 10px; border-radius:8px;
  cursor:pointer; transition:all .2s;
}
.hbtn.gps-on { background:rgba(6,214,160,.2); border-color:var(--green); color:var(--green); }
.layer-tabs {
  display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px;
}
.layer-tabs::-webkit-scrollbar { display:none; }
.layer-tab {
  flex-shrink:0; display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,.07); border:1px solid var(--border);
  border-radius:8px; padding:5px 10px; cursor:pointer; white-space:nowrap;
}
.layer-tab.active { background:rgba(245,166,35,.2); border-color:var(--gold); }
.layer-tab-icon  { font-size:1rem; }
.layer-tab-label { font-size:.72rem; font-weight:700; color:var(--dim); }
.layer-tab.active .layer-tab-label { color:var(--gold2); }
.opacity-wrap { display:flex; align-items:center; gap:8px; margin-top:8px; }
.opacity-wrap label { font-size:.65rem; color:var(--dim); white-space:nowrap; }
input[type=range] { flex:1; height:4px; cursor:pointer; accent-color:var(--gold); }
.info-panel {
  position:absolute; bottom:0; left:0; right:0; z-index:1000;
  background:linear-gradient(0deg,rgba(6,13,24,.97),rgba(6,13,24,.85));
  backdrop-filter:blur(10px); border-top:1px solid var(--border);
  padding:10px 14px 12px;
}
.info-row { display:flex; gap:8px; }
.info-card {
  flex:1; background:rgba(255,255,255,.06); border:1px solid var(--border);
  border-radius:10px; padding:8px 6px; text-align:center;
}
.info-val { font-size:.85rem; font-weight:700; color:var(--text); }
.info-lbl { font-size:.56rem; color:var(--dim); margin-top:2px; }
.gps-pulse {
  width:18px; height:18px; background:var(--green);
  border-radius:50%; border:3px solid white; animation:gpsPulse 2s infinite;
}
@keyframes gpsPulse {
  0%   { box-shadow:0 0 0 0 rgba(6,214,160,.6); }
  70%  { box-shadow:0 0 0 12px rgba(6,214,160,0); }
  100% { box-shadow:0 0 0 0 rgba(6,214,160,0); }
}
.loading-bar {
  position:absolute; inset:0; z-index:999; background:var(--night);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
.spinner {
  width:44px; height:44px; border:4px solid rgba(245,166,35,.2);
  border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:.85rem; color:var(--dim); }
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">جاري تحميل الخريطة...</div>
</div>

<div id="map"></div>

<div class="top-bar">
  <div class="top-bar-row1">
    <div class="brand">
      <div class="brand-icon">&#127907;</div>
      <div>
        <div class="brand-text">خريطة الصياد</div>
        <div class="brand-sub" id="active-label">اختر طبقة</div>
      </div>
    </div>
    <div class="header-btns">
      <button class="hbtn" id="gps-btn" onclick="toggleGPS()">&#128205; GPS</button>
      <button class="hbtn" onclick="map.setView([36.2,0.3],9)">&#127758; العودة</button>
    </div>
  </div>
  <div class="layer-tabs">
    <div class="layer-tab active" onclick="switchLayer('sst',this)">
      <span class="layer-tab-icon">&#127777;</span>
      <span class="layer-tab-label">حرارة</span>
    </div>
    <div class="layer-tab" onclick="switchLayer('ssh',this)">
      <span class="layer-tab-icon">&#11205;</span>
      <span class="layer-tab-label">مستوى البحر</span>
    </div>
    <div class="layer-tab" onclick="switchLayer('uo',this)">
      <span class="layer-tab-icon">&#8596;</span>
      <span class="layer-tab-label">تيار شرق/غرب</span>
    </div>
    <div class="layer-tab" onclick="switchLayer('vo',this)">
      <span class="layer-tab-icon">&#8597;</span>
      <span class="layer-tab-label">تيار شمال/جنوب</span>
    </div>
  </div>
  <div class="opacity-wrap">
    <label>شفافية</label>
    <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.85"
           oninput="setOpacity(this.value)">
  </div>
</div>

<div class="info-panel">
  <div class="info-row">
    <div class="info-card">
      <div class="info-val" id="info-lat">--</div>
      <div class="info-lbl">خط العرض</div>
    </div>
    <div class="info-card">
      <div class="info-val" id="info-lon">--</div>
      <div class="info-lbl">خط الطول</div>
    </div>
    <div class="info-card">
      <div class="info-val" id="info-zoom">9</div>
      <div class="info-lbl">التكبير</div>
    </div>
    <div class="info-card">
      <div class="info-val" id="info-gps">--</div>
      <div class="info-lbl">دقة GPS</div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  غيّر التاريخ فقط كل يوم
// ============================================================
var DATE = "2026-03-18";
// ============================================================

var LAYERS = {
  sst: {
    label:"حرارة السطح (C)",
    tiles:"tiles/" + DATE + "/sst_tiles/{z}/{x}/{y}.png",
  },
  ssh: {
    label:"مستوى سطح البحر (m)",
    img:"tiles/" + DATE + "/ssh.png",
    bounds:[[35.7187,-0.4062],[36.6562,0.9687]],
  },
  uo: {
    label:"تيار شرق/غرب (m/s)",
    img:"tiles/" + DATE + "/uo.png",
    bounds:[[35.75,-0.4166],[36.6666,1.0]],
  },
  vo: {
    label:"تيار شمال/جنوب (m/s)",
    img:"tiles/" + DATE + "/vo.png",
    bounds:[[35.75,-0.4166],[36.6666,1.0]],
  },
};

var map = L.map('map',{zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{maxZoom:18,zIndex:650}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);
map.setView([36.2,0.3],9);

var currentOverlay = null;
var currentOpacity = 0.85;

function switchLayer(id, tabEl) {
  var cfg = LAYERS[id];
  if (!cfg) return;
  document.querySelectorAll('.layer-tab').forEach(function(t){ t.classList.remove('active'); });
  if (tabEl) tabEl.classList.add('active');
  document.getElementById('active-label').textContent = cfg.label;
  document.getElementById('loading-bar').style.display = 'flex';
  document.getElementById('loading-text').textContent = 'جاري تحميل ' + cfg.label + '...';
  if (currentOverlay) { map.removeLayer(currentOverlay); currentOverlay = null; }

  if (cfg.tiles) {
    // XYZ Tiles — دقة كاملة عند التكبير
    currentOverlay = L.tileLayer(cfg.tiles, {
      opacity: currentOpacity,
      minZoom: 6, maxZoom: 12,
      tms: false,
    }).addTo(map);
    currentOverlay.on('load', function() {
      document.getElementById('loading-bar').style.display = 'none';
    });
    document.getElementById('loading-bar').style.display = 'none';
  } else {
    // Image Overlay عادي
    var img = new Image();
    img.onload = function() {
      currentOverlay = L.imageOverlay(cfg.img, cfg.bounds, {opacity:currentOpacity}).addTo(map);
      document.getElementById('loading-bar').style.display = 'none';
    };
    img.onerror = function() {
      document.getElementById('loading-text').textContent = 'تعذر تحميل: ' + cfg.img;
    };
    img.src = cfg.img;
  }
}

function setOpacity(val) {
  currentOpacity = parseFloat(val);
  if (currentOverlay) currentOverlay.setOpacity(currentOpacity);
}

map.on('mousemove',function(e){
  document.getElementById('info-lat').textContent = e.latlng.lat.toFixed(4)+'N';
  document.getElementById('info-lon').textContent = e.latlng.lng.toFixed(4)+'E';
});
map.on('zoomend',function(){
  document.getElementById('info-zoom').textContent = map.getZoom();
});

var gpsMarker=null,gpsCircle=null,gpsWatchId=null,gpsActive=false;
function toggleGPS(){ gpsActive ? stopGPS() : startGPS(); }
function startGPS(){
  if(!navigator.geolocation){alert('المتصفح لا يدعم GPS');return;}
  var btn=document.getElementById('gps-btn'); btn.textContent='...';
  gpsWatchId=navigator.geolocation.watchPosition(function(pos){
    var lat=pos.coords.latitude,lon=pos.coords.longitude,acc=pos.coords.accuracy;
    var icon=L.divIcon({className:'',html:'<div class="gps-pulse"></div>',iconSize:[18,18],iconAnchor:[9,9]});
    if(!gpsMarker){
      gpsMarker=L.marker([lat,lon],{icon:icon,zIndexOffset:1000}).addTo(map).bindPopup('موقعك الحالي');
      gpsCircle=L.circle([lat,lon],{radius:acc,color:'#06d6a0',fillColor:'#06d6a0',fillOpacity:0.1,weight:1}).addTo(map);
      map.setView([lat,lon],12);
    } else { gpsMarker.setLatLng([lat,lon]); gpsCircle.setLatLng([lat,lon]); gpsCircle.setRadius(acc); }
    document.getElementById('info-lat').textContent=lat.toFixed(4)+'N';
    document.getElementById('info-lon').textContent=lon.toFixed(4)+'E';
    document.getElementById('info-gps').textContent=Math.round(acc)+'m';
    btn.textContent='GPS نشط'; btn.classList.add('gps-on'); gpsActive=true;
  },function(err){
    document.getElementById('gps-btn').textContent='GPS';
    alert('تعذر تحديد الموقع: '+err.message);
  },{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}
function stopGPS(){
  if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
  if(gpsMarker){map.removeLayer(gpsMarker);gpsMarker=null;}
  if(gpsCircle){map.removeLayer(gpsCircle);gpsCircle=null;}
  var btn=document.getElementById('gps-btn');
  btn.textContent='GPS'; btn.classList.remove('gps-on');
  document.getElementById('info-gps').textContent='--';
  gpsActive=false; gpsWatchId=null;
}

switchLayer('sst', document.querySelector('.layer-tab'));
</script>
</body>
</html>
