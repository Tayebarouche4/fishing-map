<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام خرائط مستغانم المتكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --night:#060d18; --gold:#f5a623; --gold2:#ffd166;
            --green:#06d6a0; --dim:#6a9bb8; --text:#e8f1f8;
            --border:rgba(100,180,220,0.2);
        }
        html,body { width:100%; height:100%; overflow:hidden; font-family:'Tajawal',sans-serif; background:var(--night); }
        #map { width:100%; height:100%; z-index: 1; }

        /* شاشة الدخول الاحترافية */
        .login-overlay {
            position:fixed; inset:0; z-index:9999; background:var(--night);
            display:flex; align-items:center; justify-content:center;
        }
        .login-box {
            background:rgba(17,36,64,.95); border:1px solid var(--gold);
            border-radius:20px; padding:35px; width:90%; max-width:350px; text-align:center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .login-input {
            width:100%; padding:15px; background:rgba(255,255,255,0.05);
            border:1px solid var(--border); border-radius:12px; color:white;
            text-align:center; margin:20px 0; font-size:1.2rem; outline:none;
        }

        /* الشريط العلوي مع الطبقات */
        .top-bar {
            position:absolute; top:0; left:0; right:0; z-index:1000;
            background:linear-gradient(180deg,rgba(6,13,24,.97),rgba(6,13,24,.85));
            backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
            padding:10px 14px 8px;
        }
        .top-bar-row1 { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
        .brand { display:flex; align-items:center; gap:8px; }
        .brand-icon {
            width:34px; height:34px; background:linear-gradient(135deg,var(--gold),#d06b00);
            border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;
        }
        .layer-tabs { display:flex; gap:6px; overflow-x:auto; padding:5px 0; scrollbar-width:none; }
        .layer-tab {
            flex-shrink:0; display:flex; align-items:center; gap:6px;
            background:rgba(255,255,255,.07); border:1px solid var(--border);
            border-radius:8px; padding:6px 12px; cursor:pointer; color:var(--dim); font-size:0.75rem;
        }
        .layer-tab.active { background:rgba(245,166,35,.2); border-color:var(--gold); color:var(--gold2); }

        /* زر المسارات المميز */
        .route-btn {
            margin-top:8px; display:inline-flex; align-items:center; gap:6px;
            background:rgba(6,214,160,0.1); border:1px solid rgba(6,214,160,0.3);
            border-radius:8px; padding:6px 12px; color:var(--green); font-size:0.75rem; cursor:pointer;
        }
        .route-btn.active { background:rgba(6,214,160,0.25); border-color:var(--green); }

        /* الأزرار العائمة */
        .report-fab {
            position:fixed; bottom:100px; right:20px; z-index:1001;
            width:56px; height:56px; background:linear-gradient(135deg,var(--gold),#d06b00);
            border:none; border-radius:50%; font-size:24px; cursor:pointer;
            display:none; align-items:center; justify-content:center; box-shadow:0 4px 15px rgba(0,0,0,0.5);
        }

        .gps-pulse {
            width:16px; height:16px; background:var(--green);
            border-radius:50%; border:2px solid white; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(6,214,160,0.7); } 70% { box-shadow:0 0 0 10px rgba(6,214,160,0); } 100% { box-shadow:0 0 0 0 rgba(6,214,160,0); } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="login-overlay" id="login-overlay">
    <div class="login-box">
        <div style="font-size:50px;">⚓</div>
        <h2 style="color:white; margin-top:10px;">دليل الصياد</h2>
        <input type="text" id="login-input" class="login-input" placeholder="أدخل الكود (مثلاً FISHER_01)">
        <button onclick="doLogin()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:12px; font-weight:bold; cursor:pointer;">دخول</button>
        <div id="login-error" style="color:#ef233c; margin-top:10px; display:none;">❌ كود غير صحيح</div>
    </div>
</div>

<div class="top-bar" id="ui-controls" style="display:none;">
    <div class="top-bar-row1">
        <div class="brand">
            <div class="brand-icon">🎣</div>
            <div class="brand-text" style="color:white; font-weight:900; font-size:0.9rem;">خريطة مستغانم</div>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="hbtn" id="gps-btn" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem;">📍 GPS</button>
        </div>
    </div>
    
    <div class="layer-tabs">
        <div class="layer-tab active" onclick="switchLayer('sst', this)">🌡️ حرارة</div>
        <div class="layer-tab" onclick="switchLayer('ssh', this)">🌊 مستوى البحر</div>
        <div class="layer-tab" onclick="switchLayer('uo', this)">⬅️ تيار E/W</div>
        <div class="layer-tab" onclick="switchLayer('vo', this)">⬆️ تيار N/S</div>
    </div>

    <div class="route-btn" id="route-toggle" onclick="toggleRoutes(this)">
        📍 <span>إظهار المسارات</span>
    </div>
</div>

<button class="report-fab" id="report-fab" onclick="alert('واجهة التقييم جاهزة')">📋</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
    var map = L.map('map', {zoomControl:false}).setView([36.2, 0.3], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var VALID_CODES = ["FISHER_01","FISHER_02","FISHER_03","FISHER_04","FISHER_05"];
    var gpsMarker, currentUser, routeLayer = null;

    function doLogin() {
        var code = document.getElementById('login-input').value.trim().toUpperCase();
        if (VALID_CODES.indexOf(code) >= 0) {
            currentUser = code;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('ui-controls').style.display = 'block';
            document.getElementById('report-fab').style.display = 'flex';
            startGPS();
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function startGPS() {
        navigator.geolocation.watchPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var icon = L.divIcon({className:'', html:'<div class="gps-pulse"></div>', iconSize:[16,16]});
            if(!gpsMarker) {
                gpsMarker = L.marker([lat, lon], {icon: icon}).addTo(map);
                map.setView([lat, lon], 12);
            } else {
                gpsMarker.setLatLng([lat, lon]);
            }
        }, null, {enableHighAccuracy:true});
    }

    function switchLayer(type, btn) {
        document.querySelectorAll('.layer-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        console.log("تغيير الطبقة إلى: " + type);
        // هنا يمكنك استكمال كود L.imageOverlay لربطها ببيانات QGIS الخاصة بك
    }

    function toggleRoutes(btn) {
        if (routeLayer) {
            map.removeLayer(routeLayer);
            routeLayer = null;
            btn.classList.remove('active');
            btn.querySelector('span').textContent = "إظهار المسارات";
        } else {
            // محاكاة تحميل المسارات (يمكنك ربطها بملف GeoJSON الخاص بك)
            btn.classList.add('active');
            btn.querySelector('span').textContent = "إخفاء المسارات";
            alert("تم تفعيل طبقة المسارات البحرية لميناء مستغانم");
        }
    }
</script>
</body>
</html>
