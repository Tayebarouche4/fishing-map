<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚨 استقبال نداءات الاستغاثة - دليل الصياد</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #0a0f1e;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
}
h1 {
  text-align: center;
  color: #d4af37;
  font-size: 1.3rem;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(212,175,55,0.3);
}
.sos-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}
.sos-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(239,68,68,0.4);
  border-radius: 16px;
  padding: 16px;
  transition: all 0.2s;
}
.sos-card.active {
  border-color: #ef4444;
  background: rgba(239,68,68,0.08);
}
.sos-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.sos-name {
  font-size: 1.2rem;
  font-weight: bold;
  color: #ef4444;
}
.sos-time {
  font-size: 0.7rem;
  color: #94a3b8;
}
.sos-phone {
  background: rgba(74,222,128,0.15);
  border: 2px solid #4ade80;
  border-radius: 16px;
  padding: 12px;
  margin: 12px 0;
  text-align: center;
  direction: ltr;
}
.sos-phone-label {
  font-size: 0.75rem;
  color: #94a3b8;
  margin-bottom: 5px;
  display: block;
}
.sos-phone-number {
  font-size: 1.8rem;
  font-weight: bold;
  letter-spacing: 1px;
}
.sos-phone-number a {
  color: #4ade80;
  text-decoration: none;
  display: block;
}
.sos-location {
  font-size: 0.8rem;
  color: #94a3b8;
  margin: 8px 0;
}
.location-buttons {
  display: flex;
  gap: 10px;
  margin: 12px 0;
}
.location-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  font-size: 0.85rem;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  border: none;
}
.btn-map {
  background: rgba(59,130,246,0.2);
  border: 1px solid #3b82f6;
  color: #3b82f6;
}
.btn-google {
  background: rgba(34,197,94,0.2);
  border: 1px solid #22c55e;
  color: #22c55e;
}
.btn-respond {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: bold;
  color: white;
  cursor: pointer;
  margin-top: 8px;
  transition: transform 0.2s;
}
.btn-respond:active { transform: scale(0.98); }
.btn-respond.responded {
  background: linear-gradient(135deg, #16a34a, #15803d);
  opacity: 0.7;
}
.btn-refresh {
  width: 100%;
  padding: 12px;
  background: rgba(212,175,55,0.15);
  border: 1px solid #d4af37;
  color: #d4af37;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 16px;
}
.loading { text-align: center; color: #64748b; padding: 40px; }
.error { text-align: center; color: #ef4444; padding: 20px; }
.empty { text-align: center; color: #64748b; padding: 40px; }
.responders-count {
  font-size: 0.75rem;
  color: #22c55e;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>
<body>

<h1>🚨 استقبال نداءات الاستغاثة</h1>

<button class="btn-refresh" onclick="loadActiveSOS()">🔄 تحديث</button>

<div id="sosList" class="sos-list">
  <div class="loading">جاري تحميل النداءات...</div>
</div>

<script>
var API_BASE_SOS = "https://fishing-xbds.onrender.com";
var API_KEY_SOS = "fishing123";
var currentResponderCode = localStorage.getItem('fisherman_code');
var currentResponderName = localStorage.getItem('fisherman_name');
var currentResponderPhone = localStorage.getItem('fisherman_phone');

// خريطة عالمية لعرض الموقع
var sosMap = null;
var sosMarker = null;

function loadActiveSOS() {
  var container = document.getElementById('sosList');
  container.innerHTML = '<div class="loading">جاري تحميل النداءات...</div>';
  
  fetch(API_BASE_SOS + '/api/sos/active', {
    headers: { 'x-api-key': API_KEY_SOS }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success' && data.active_sos && data.active_sos.length > 0) {
      displaySOSList(data.active_sos);
    } else {
      container.innerHTML = '<div class="empty">لا توجد نداءات استغاثة نشطة حالياً</div>';
    }
  })
  .catch(function() {
    container.innerHTML = '<div class="error">حدث خطأ في تحميل النداءات</div>';
  });
}

function displaySOSList(sosList) {
  var container = document.getElementById('sosList');
  var html = '';
  
  sosList.forEach(function(sos) {
    var timeFormatted = new Date(sos.time).toLocaleString('ar');
    var respondersCount = sos.responders_count || 0;
    var phoneNumber = sos.phone || 'رقم غير متوفر';
    
    html += `
      <div class="sos-card active" id="sos-card-${sos.id}" data-lat="${sos.lat}" data-lon="${sos.lon}" data-name="${sos.name || sos.code}" data-phone="${phoneNumber}">
        <div class="sos-header">
          <span class="sos-name">🚨 ${sos.name || sos.code}</span>
          <span class="sos-time">${timeFormatted}</span>
        </div>
        <div class="sos-phone">
          <span class="sos-phone-label">📞 رقم الهاتف (اضغط للاتصال المباشر)</span>
          <div class="sos-phone-number">
            <a href="tel:${phoneNumber}">${phoneNumber}</a>
          </div>
        </div>
        <div class="sos-location">
          📍 الموقع: ${sos.lat}, ${sos.lon}
        </div>
        <div class="location-buttons">
          <button class="location-btn btn-map" onclick="showOnMap('${sos.id}')">🗺️ عرض على الخريطة</button>
          <button class="location-btn btn-google" onclick="openGoogleMaps(${sos.lat}, ${sos.lon})">🧭 فتح في خرائط جوجل</button>
        </div>
        <button class="btn-respond" id="respond-btn-${sos.id}" onclick="respondToSOS('${sos.code}')">🚤 أنا متجه للمساعدة</button>
        <div class="responders-count" id="responders-count-${sos.id}">👥 عدد المستجيبين: ${respondersCount}</div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function showOnMap(sosId) {
  var card = document.getElementById('sos-card-' + sosId);
  if (!card) return;
  
  var lat = parseFloat(card.getAttribute('data-lat'));
  var lon = parseFloat(card.getAttribute('data-lon'));
  var name = card.getAttribute('data-name');
  var phone = card.getAttribute('data-phone');
  
  // إنشاء نافذة خريطة منبثقة
  var modalHtml = `
    <div id="mapModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:flex; flex-direction:column;">
      <div style="background:#0a0f1e; padding:12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #d4af37;">
        <span style="color:#d4af37;">📍 موقع المستغيث: ${name}</span>
        <button onclick="closeMapModal()" style="background:#ef4444; border:none; color:white; padding:6px 12px; border-radius:8px; cursor:pointer;">✕ إغلاق</button>
      </div>
      <div id="sosMapContainer" style="flex:1; width:100%;"></div>
      <div style="background:#0a0f1e; padding:12px; text-align:center; border-top:1px solid rgba(255,255,255,0.1);">
        <a href="tel:${phone}" style="color:#4ade80; text-decoration:none; font-size:1.2rem;">📞 الاتصال بالمستغيث: ${phone}</a>
      </div>
    </div>
  `;
  
  document.body.insertAdjacentHTML('beforeend', modalHtml);
  
  // تحميل الخريطة
  var mapContainer = document.getElementById('sosMapContainer');
  var map = L.map(mapContainer).setView([lat, lon], 15);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
  }).addTo(map);
  
  L.marker([lat, lon]).addTo(map)
    .bindPopup('<b>' + name + '</b><br>📞 ' + phone + '<br>📍 موقع الاستغاثة')
    .openPopup();
}

function closeMapModal() {
  var modal = document.getElementById('mapModal');
  if (modal) modal.remove();
}

function openGoogleMaps(lat, lon) {
  var url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
  window.open(url, '_blank');
}

function respondToSOS(sosCode) {
  if (!currentResponderCode) {
    alert("⚠️ الرجاء تسجيل الدخول أولاً");
    return;
  }
  
  var btn = document.getElementById('respond-btn-' + sosCode);
  btn.disabled = true;
  btn.innerHTML = '⏳ جاري التسجيل...';
  
  fetch(API_BASE_SOS + '/api/sos/respond', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY_SOS
    },
    body: JSON.stringify({
      sos_code: sosCode,
      responder_code: currentResponderCode,
      responder_name: currentResponderName || currentResponderCode,
      responder_phone: currentResponderPhone || ''
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      btn.innerHTML = '✅ تم تسجيل استجابتك';
      btn.classList.add('responded');
      loadActiveSOS();
    } else {
      alert("❌ فشل التسجيل: " + (data.detail || "خطأ غير معروف"));
      btn.disabled = false;
      btn.innerHTML = '🚤 أنا متجه للمساعدة';
    }
  })
  .catch(function() {
    alert("❌ خطأ في الاتصال بالخادم");
    btn.disabled = false;
    btn.innerHTML = '🚤 أنا متجه للمساعدة';
  });
}

loadActiveSOS();
setInterval(loadActiveSOS, 15000);
</script>

<!-- Leaflet للخريطة -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

</body>
</html>
