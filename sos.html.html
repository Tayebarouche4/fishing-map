<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚨 تنبيه طوارئ - دليل الصياد</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #0a0f1e;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 0;
  margin: 0;
}
.sos-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0a0f1e;
  z-index: 9999;
  overflow-y: auto;
  padding: 20px;
}
.sos-header {
  text-align: center;
  padding: 20px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border-radius: 20px;
  margin-bottom: 20px;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.85; }
}
.sos-header h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}
.sos-header p {
  font-size: 1.2rem;
}
.info-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}
.info-label {
  font-size: 0.8rem;
  color: #94a3b8;
  margin-bottom: 5px;
}
.info-value {
  font-size: 1.3rem;
  font-weight: bold;
  color: #e2e8f0;
}
.phone-number {
  font-size: 2rem;
  font-weight: bold;
  color: #4ade80;
  text-align: center;
  padding: 15px;
  background: rgba(74,222,128,0.1);
  border-radius: 16px;
  border: 2px solid #4ade80;
  margin: 15px 0;
  direction: ltr;
}
.phone-number a {
  color: #4ade80;
  text-decoration: none;
  display: block;
}
.location-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
.location-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  border: none;
}
.btn-map {
  background: rgba(59,130,246,0.2);
  border: 1px solid #3b82f6;
  color: #3b82f6;
}
.btn-google {
  background: rgba(34,197,94,0.2);
  border: 1px solid #22c55e;
  color: #22c55e;
}
.btn-respond {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 16px;
  font-size: 1.4rem;
  font-weight: bold;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  transition: transform 0.2s;
}
.btn-respond:active { transform: scale(0.98); }
.btn-close {
  width: 100%;
  padding: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #e2e8f0;
  font-size: 1rem;
  cursor: pointer;
  margin-top: 10px;
}
.responders-list {
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  padding: 12px;
  margin-top: 15px;
}
.responder-item {
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 0.85rem;
}
.status-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  margin-top: 10px;
}
.status-pending { background: rgba(234,179,8,0.2); color: #eab308; }
.status-responding { background: rgba(34,197,94,0.2); color: #22c55e; }
.countdown {
  text-align: center;
  font-size: 0.8rem;
  color: #64748b;
  margin-top: 15px;
}
</style>
</head>
<body>
<div id="sosContainer" class="sos-container">
  <div class="sos-header">
    <h1>🚨 🚨 🚨</h1>
    <p>تنبيه طوارئ - استغاثة عاجلة</p>
  </div>
  
  <div class="info-card">
    <div class="info-label">👤 المستغيث</div>
    <div class="info-value" id="victimName">جاري التحميل...</div>
    <div class="info-label" style="margin-top: 10px;">📝 الكود</div>
    <div class="info-value" id="victimCode">---</div>
  </div>
  
  <div class="info-card">
    <div class="info-label">📞 رقم الهاتف (اضغط للاتصال)</div>
    <div class="phone-number" id="phoneNumber">
      <a href="tel:">جاري التحميل...</a>
    </div>
  </div>
  
  <div class="info-card">
    <div class="info-label">📍 الموقع</div>
    <div class="info-value" id="locationCoords">جاري التحميل...</div>
    <div class="location-row">
      <button class="location-btn btn-map" onclick="showOnMap()">🗺️ عرض على خريطة الموقع</button>
      <button class="location-btn btn-google" onclick="openGoogleMaps()">🧭 فتح في خرائط جوجل</button>
    </div>
  </div>
  
  <div class="info-card">
    <div class="info-label">🚤 الحالة</div>
    <div class="info-value" id="victimNote">نداء استغاثة - يحتاج مساعدة فورية</div>
  </div>
  
  <div class="info-card" id="respondersCard" style="display:none;">
    <div class="info-label">👥 المستجيبون القادمون</div>
    <div id="respondersList" class="responders-list">
      <div class="responder-item">⏳ جاري تحديث المستجيبين...</div>
    </div>
  </div>
  
  <button class="btn-respond" id="respondBtn" onclick="respondToSOS()">🚤 أنا متجه للمساعدة</button>
  <button class="btn-close" onclick="closeSOSWindow()">إغلاق</button>
  <div class="countdown" id="countdown"></div>
</div>

<script>
var API_BASE = "https://fishing-xbds.onrender.com";
var API_KEY = "fishing123";
var currentUserCode = localStorage.getItem('fisherman_code');
var currentUserName = localStorage.getItem('fisherman_name');
var currentUserPhone = localStorage.getItem('fisherman_phone');
var sosData = null;
var eventSource = null;

// قراءة بيانات SOS من الرابط
function getSOSDataFromURL() {
  var params = new URLSearchParams(window.location.search);
  return {
    code: params.get('code'),
    lat: parseFloat(params.get('lat')),
    lon: parseFloat(params.get('lon')),
    note: params.get('note') || 'نداء استغاثة',
    name: params.get('name') || '',
    phone: params.get('phone') || '',
    time: params.get('time') || ''
  };
}

function loadSOSData() {
  sosData = getSOSDataFromURL();
  
  if (!sosData.code) {
    document.getElementById('victimName').innerHTML = 'بيانات غير متوفرة';
    document.getElementById('phoneNumber').innerHTML = '<a href="#">---</a>';
    return;
  }
  
  document.getElementById('victimName').innerHTML = sosData.name || 'صياد';
  document.getElementById('victimCode').innerHTML = sosData.code;
  document.getElementById('locationCoords').innerHTML = sosData.lat + '° N, ' + sosData.lon + '° E';
  document.getElementById('victimNote').innerHTML = sosData.note;
  
  var phoneLink = document.getElementById('phoneNumber').querySelector('a');
  if (sosData.phone) {
    phoneLink.href = 'tel:' + sosData.phone;
    phoneLink.innerHTML = '📱 ' + sosData.phone;
  } else {
    phoneLink.innerHTML = 'رقم غير متوفر';
  }
  
  // بدء تحديث المستجيبين كل 10 ثواني
  startUpdatingResponders();
}

function showOnMap() {
  if (typeof map !== 'undefined' && map) {
    map.setView([sosData.lat, sosData.lon], 15);
    if (typeof L !== 'undefined') {
      L.marker([sosData.lat, sosData.lon]).addTo(map).bindPopup('📍 موقع المستغيث').openPopup();
    }
    closeSOSWindow();
  } else {
    openGoogleMaps();
  }
}

function openGoogleMaps() {
  var url = `https://www.google.com/maps/dir/?api=1&destination=${sosData.lat},${sosData.lon}`;
  window.open(url, '_blank');
}

function respondToSOS() {
  if (!currentUserCode) {
    alert('الرجاء تسجيل الدخول أولاً');
    return;
  }
  
  var btn = document.getElementById('respondBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ جاري التسجيل...';
  
  fetch(API_BASE + '/api/sos/respond', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY
    },
    body: JSON.stringify({
      sos_code: sosData.code,
      responder_code: currentUserCode,
      responder_name: currentUserName,
      responder_phone: currentUserPhone
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success') {
      btn.innerHTML = '✅ تم تسجيل استجابتك';
      btn.style.background = 'linear-gradient(135deg, #16a34a, #15803d)';
      showNotification('تم تسجيل استجابتك! المستغيث سيرى أنك في طريقك.', 'success');
      startUpdatingResponders();
    } else {
      btn.innerHTML = '🚤 أنا متجه للمساعدة';
      btn.disabled = false;
      showNotification(data.detail || 'حدث خطأ', 'error');
    }
  })
  .catch(function() {
    btn.innerHTML = '🚤 أنا متجه للمساعدة';
    btn.disabled = false;
    showNotification('خطأ في الاتصال', 'error');
  });
}

function startUpdatingResponders() {
  updateRespondersList();
  setInterval(updateRespondersList, 10000);
}

function updateRespondersList() {
  fetch(API_BASE + '/api/sos/responders/' + sosData.code, {
    headers: { 'x-api-key': API_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.status === 'success' && data.responders && data.responders.length > 0) {
      document.getElementById('respondersCard').style.display = 'block';
      var html = '';
      data.responders.forEach(function(r) {
        html += '<div class="responder-item">🚤 ' + (r.name || r.code) + ' - متجه للمساعدة</div>';
      });
      document.getElementById('respondersList').innerHTML = html;
    }
  })
  .catch(function() {});
}

function closeSOSWindow() {
  window.close();
  window.location.href = '/fishing-map/';
}

function showNotification(message, type) {
  var div = document.createElement('div');
  div.textContent = message;
  div.style.cssText = 'position:fixed;bottom:20px;right:20px;background:' + 
    (type === 'success' ? '#22c55e' : '#ef4444') + 
    ';color:white;padding:12px 20px;border-radius:8px;z-index:10000;font-size:0.85rem;';
  document.body.appendChild(div);
  setTimeout(function() { div.remove(); }, 4000);
}

loadSOSData();
</script>
</body>
</html>
